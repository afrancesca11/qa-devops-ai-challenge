name: CI — QA Pipeline

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Pruebas de carga con k6
  # ─────────────────────────────────────────
  k6-load-test:
    name: "k6 — Load Test"
    runs-on: ubuntu-latest
    # Solo ejecutar si el script de k6 existe en la rama del PR
    if: ${{ hashFiles('performance/k6/load-test.js') != '' }}

    steps:
      # 1. Checkout del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalación de dependencias
      - name: Instalar k6
        uses: grafana/setup-k6-action@v1

      # 3. Ejecución de pruebas
      - name: Ejecutar Load Test
        run: |
          mkdir -p evidences
          k6 run \
            --out json=evidences/resultados.json \
            --summary-export=evidences/k6-summary.json \
            performance/k6/load-test.js

      # 4. Generación de reporte
      - name: Generar reporte de resultados
        if: always()
        run: |
          echo "## k6 Load Test — Resultados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import json, os, sys
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          try:
              with open("evidences/k6-summary.json") as f:
                  data = json.load(f)
              m = data.get("metrics", {})
              def val(metric, stat):
                  return m.get(metric, {}).get("values", {}).get(stat)
              rows = [
                  ("http_req_duration avg",  f"{val('http_req_duration','avg'):.2f} ms"),
                  ("http_req_duration p(95)", f"{val('http_req_duration','p(95)'):.2f} ms"),
                  ("http_req_duration max",  f"{val('http_req_duration','max'):.2f} ms"),
                  ("Total requests",         str(val('http_reqs','count'))),
                  ("Tasa de errores",        f"{val('http_req_failed','rate')*100:.2f}%"),
                  ("Checks aprobados",       f"{val('checks','rate')*100:.2f}%"),
              ]
              with open(step_summary, "a") as out:
                  for label, value in rows:
                      out.write(f"| {label} | {value} |\n")
              print("Reporte k6 generado")
          except Exception as e:
              print(f"Advertencia: {e}", file=sys.stderr)
          PYEOF

      # 5. Publicación de artefactos
      - name: Publicar artefactos k6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            evidences/resultados.json
            evidences/k6-summary.json

  # ─────────────────────────────────────────
  # JOB 2: Pruebas de IA (simulación)
  # ─────────────────────────────────────────
  ai-tests:
    name: "IA — Matriz de pruebas"
    runs-on: ubuntu-latest
    # Solo ejecutar si el script de IA existe en la rama del PR
    if: ${{ hashFiles('tests/ai/run_ai_tests.py') != '' }}

    steps:
      # 1. Checkout del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Instalación de dependencias
      - name: Verificar Python
        run: |
          python3 --version
          echo "Dependencias: stdlib únicamente (json, os, datetime)"

      # 3. Ejecución de pruebas
      - name: Ejecutar matriz de pruebas IA
        run: |
          mkdir -p evidences
          python3 tests/ai/run_ai_tests.py

      # 4. Generación de reporte
      - name: Generar reporte de resultados
        if: always()
        run: |
          echo "## AI QA Tests — Resultados" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          python3 - <<'PYEOF'
          import json, os, sys
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          try:
              with open("evidences/ai-test-results.json") as f:
                  data = json.load(f)
              r = data.get("resumen", {})
              with open(step_summary, "a") as out:
                  out.write(f"| Total casos | {r.get('total')} |\n")
                  out.write(f"| PASS | {r.get('pass')} |\n")
                  out.write(f"| FAIL | {r.get('fail')} |\n")
                  out.write(f"| Tasa de aprobación | {r.get('tasa_aprobacion')} |\n")
                  out.write(f"| Veredicto | {r.get('veredicto')} |\n")
                  out.write("\n### Detalle por caso\n\n")
                  out.write("| ID | Categoría | Score | Estado |\n")
                  out.write("|----|-----------|-------|--------|\n")
                  for tc in data.get("test_cases", []):
                      ev = tc.get("evaluacion", {})
                      out.write(f"| {tc['id']} | {tc['categoria']} | {ev.get('score')} | {ev.get('status')} |\n")
              print("Reporte IA generado")
          except Exception as e:
              print(f"Advertencia: {e}", file=sys.stderr)
          PYEOF

      # 5. Publicación de artefactos
      - name: Publicar artefactos IA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-results
          path: evidences/ai-test-results.json

  # ─────────────────────────────────────────
  # JOB 3: Validar estructura del repositorio
  # (corre siempre, garantiza que el CI pase
  #  en PRs que solo traen el workflow)
  # ─────────────────────────────────────────
  validate-structure:
    name: "Validar estructura del proyecto"
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Sin dependencias externas
      - name: Sin dependencias externas requeridas
        run: echo "Validación de estructura usa solo bash"

      # 3. Verificar archivos del proyecto
      - name: Verificar estructura del repositorio
        run: |
          echo "## Estructura del repositorio" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Archivo / Carpeta | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------------|--------|" >> $GITHUB_STEP_SUMMARY

          check_path() {
            if [ -e "$1" ]; then
              echo "| \`$1\` | ✅ presente |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`$1\` | ⚠️ ausente |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          check_path ".github/workflows/ci.yml"
          check_path "docs/test-plan.md"
          check_path "docs/ai-analysis.md"
          check_path "docs/bug-reports.md"
          check_path "README.md"
          check_path "performance/k6/load-test.js"
          check_path "tests/ai/run_ai_tests.py"
          check_path "evidences"

          echo "Validación completada"

      # 4. Generar reporte
      - name: Reporte generado en Step Summary
        run: echo "Ver tabla de estructura arriba en el summary del PR"

      # 5. Sin artefactos adicionales para este job
      - name: Sin artefactos para validación de estructura
        run: echo "Este job no genera artefactos binarios"
