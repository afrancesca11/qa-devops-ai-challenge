name: Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Ejecutar Load Test
        run: |
          mkdir -p evidences
          k6 run --out json=evidences/resultados.json performance/k6/load-test.js

      - name: Subir evidencias
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: evidences/resultados.json

  ai-tests:
    name: AI QA Tests (simulación)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar matriz de pruebas IA
        run: python3 tests/ai/run_ai_tests.py

      - name: Subir resultados IA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-results
          path: evidences/ai-test-results.json
