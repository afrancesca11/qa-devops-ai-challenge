name: Performance & AI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Pruebas de carga con k6
  # ─────────────────────────────────────────
  k6-load-test:
    name: k6 Load Test
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar dependencias — k6
        uses: grafana/setup-k6-action@v1

      - name: 3. Ejecutar pruebas — Load Test
        run: |
          mkdir -p evidences
          k6 run \
            --out json=evidences/resultados.json \
            --summary-export=evidences/k6-summary.json \
            performance/k6/load-test.js

      - name: 4. Generar reporte de resultados
        if: always()
        run: |
          echo "## Resultados k6 Load Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF'
          import json, os

          summary_path = "evidences/k6-summary.json"
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          try:
              with open(summary_path) as f:
                  data = json.load(f)

              metrics = data.get("metrics", {})

              def get_val(metric, stat):
                  return metrics.get(metric, {}).get("values", {}).get(stat, "N/A")

              rows = [
                  ("http_req_duration avg",  f"{get_val('http_req_duration', 'avg'):.2f} ms" if isinstance(get_val('http_req_duration', 'avg'), float) else "N/A"),
                  ("http_req_duration p(95)", f"{get_val('http_req_duration', 'p(95)'):.2f} ms" if isinstance(get_val('http_req_duration', 'p(95)'), float) else "N/A"),
                  ("http_req_duration max",  f"{get_val('http_req_duration', 'max'):.2f} ms" if isinstance(get_val('http_req_duration', 'max'), float) else "N/A"),
                  ("http_reqs total",        str(metrics.get("http_reqs", {}).get("values", {}).get("count", "N/A"))),
                  ("http_req_failed rate",   f"{get_val('http_req_failed', 'rate') * 100:.2f}%" if isinstance(get_val('http_req_failed', 'rate'), float) else "N/A"),
                  ("checks passed",          f"{get_val('checks', 'rate') * 100:.2f}%" if isinstance(get_val('checks', 'rate'), float) else "N/A"),
              ]

              with open(step_summary, "a") as out:
                  for label, value in rows:
                      out.write(f"| {label} | {value} |\n")
                  out.write("\n")

              print("Reporte generado correctamente")
          except Exception as e:
              print(f"No se pudo parsear el summary: {e}")
          EOF

      - name: 5. Publicar artefactos k6
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            evidences/resultados.json
            evidences/k6-summary.json

  # ─────────────────────────────────────────
  # JOB 2: Pruebas de IA (simulación)
  # ─────────────────────────────────────────
  ai-tests:
    name: AI QA Tests (simulación)
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del repositorio
        uses: actions/checkout@v4

      - name: 2. Instalar dependencias — Python
        run: |
          python3 --version
          # sin dependencias externas; stdlib únicamente

      - name: 3. Ejecutar pruebas — Matriz de IA
        run: |
          mkdir -p evidences
          python3 tests/ai/run_ai_tests.py

      - name: 4. Generar reporte de resultados
        if: always()
        run: |
          echo "## Resultados AI QA Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF'
          import json, os

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")

          try:
              with open("evidences/ai-test-results.json") as f:
                  data = json.load(f)

              resumen = data.get("resumen", {})

              with open(step_summary, "a") as out:
                  out.write(f"| Total casos | {resumen.get('total', 'N/A')} |\n")
                  out.write(f"| PASS        | {resumen.get('pass', 'N/A')} |\n")
                  out.write(f"| FAIL        | {resumen.get('fail', 'N/A')} |\n")
                  out.write(f"| Aprobación  | {resumen.get('tasa_aprobacion', 'N/A')} |\n")
                  out.write(f"| Veredicto   | {resumen.get('veredicto', 'N/A')} |\n")
                  out.write("\n### Detalle por caso\n\n")
                  out.write("| ID | Categoría | Score | Estado |\n")
                  out.write("|----|-----------|-------|--------|\n")
                  for tc in data.get("test_cases", []):
                      ev = tc.get("evaluacion", {})
                      out.write(f"| {tc['id']} | {tc['categoria']} | {ev.get('score','N/A')} | {ev.get('status','N/A')} |\n")

              print("Reporte IA generado correctamente")
          except Exception as e:
              print(f"No se pudo parsear resultados IA: {e}")
          EOF

      - name: 5. Publicar artefactos IA
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-test-results
          path: evidences/ai-test-results.json
